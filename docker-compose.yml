services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: snackabetic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: a3f1b2c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/snackabetic
      AI_SERVICE_URL: http://ai:5000
    depends_on:
      - db
      - ai
    volumes:
      - uploads:/app/uploads

  ai:
    build:
      context: ./Ai
      dockerfile: Dockerfile
    ports:
      - "${AI_PORT:-5001}:5000"
    environment:
      PORT: 5000
      MODELS_DIR: /app/models

volumes:
  pgdata:
  uploads:
